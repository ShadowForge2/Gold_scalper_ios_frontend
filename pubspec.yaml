name: gold_scalper_app
description: Gold Scalper bot controller
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  intl: ^0.19.0
  fl_chart: ^0.69.0
  shimmer: ^3.0.0
  http: ^1.2.0
  url_launcher: ^6.3.0
  webview_flutter: ^4.10.0
  shared_preferences: ^2.3.0
  flutter_local_notifications: ^18.0.1
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "app_icon.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "app_icon.png"
