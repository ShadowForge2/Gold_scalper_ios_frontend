workflows:
  ios-build:
    name: iOS Release Build
    instance_type: mac_mini_m2
    environment:
       flutter: stable
       xcode: latest
    scripts:
      - flutter pub get
      - flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
      - build/ios/ipa/*.ipa
      - *.snapshot
    publishing:
      email:
        recipients:
          - shadowforge2@users.noreply.github.com
